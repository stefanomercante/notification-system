version: '3.8'

services:
  # PHP-FPM Service
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: notification_php
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - notification-network
    depends_on:
      - redis
      - mysql

  # Nginx Service
  nginx:
    image: nginx:alpine
    container_name: notification_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - notification-network
    depends_on:
      - php

  # Redis Service (Queue + Cache)
  redis:
    image: redis:7-alpine
    container_name: notification_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - notification-network
    command: redis-server --appendonly yes

  # MySQL Service (Tracking & Logs)
  mysql:
    image: mysql:8.0
    container_name: notification_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notifications
      MYSQL_USER: notifyuser
      MYSQL_PASSWORD: notifypass
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - notification-network

  # MailHog Service (Email Testing)
  mailhog:
    image: mailhog/mailhog:latest
    container_name: notification_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - notification-network

  # Queue Worker (Background processor)
  worker:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: notification_worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - notification-network
    depends_on:
      - redis
      - mysql
    command: php /var/www/src/Worker.php

networks:
  notification-network:
    driver: bridge

volumes:
  redis-data:
  mysql-data:
